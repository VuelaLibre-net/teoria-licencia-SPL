<!-- Estilos del EPUB, inyectados en el <head> de cada capítulo.
     Se usa include-in-header y NO la opción `css:` del formato epub: `css:`
     REEMPLAZA la hoja por defecto de Quarto en vez de sumarse a ella, y el EPUB
     se quedaba con 8 selectores en lugar de 40 (adiós a blockquote, code, h1-h6,
     notas al pie...). include-in-header añade sin quitar. -->
<style type="text/css">
/* Estilos del EPUB.
 *
 * Los mismos divs que en el PDF compone la extensión Typst (postit, dedicatoria,
 * epigrafe, licencia, colofon) llegan aquí como un div con esa clase porque el
 * filtro postit.lua sólo se declara en el formato typst. Este fichero les da un
 * aspecto equivalente en el EPUB.
 *
 * No se persiguen los milímetros del PDF: un EPUB no tiene página fija y el
 * lector manda sobre el cuerpo y los márgenes. Se replican los colores y la
 * intención; el resto se deja en unidades relativas.
 */

/* Resumen de capítulo con aspecto de post-it. Colores tomados del tema AsciiDoc
 * original (recursos/temas/pdf-theme.yml, rol `postit`), los mismos que usa
 * postit.typ en el PDF. */
div.postit {
  background-color: #FFF9C4;
  border: 1px solid #FBC02D;
  border-radius: 4px;
  padding: 0.9em 1.1em;
  margin: 2em 0;
  color: #5D4037;
  font-family: sans-serif;
  font-size: 0.95em;
}

div.postit > p:first-child {
  margin-top: 0;
}

div.postit > :last-child {
  margin-bottom: 0;
}

/* Dedicatoria y epígrafe no llevan título visible. Sus ficheros SÍ tienen un H1
 * —Quarto lo exige en todo capítulo del libro— marcado `.oculto`: en el PDF lo
 * retira postit.lua y aquí lo esconde el CSS. El mismo marcador para los dos
 * formatos. */
h1.oculto {
  display: none;
}

/* Dedicatoria: a la derecha, en cursiva y mayor, como en el PDF. El centrado
 * vertical no se replica: en un EPUB no hay página que centrar. */
div.dedicatoria {
  text-align: right;
  font-style: italic;
  font-size: 1.3em;
  margin: 3em 0;
  line-height: 1.5;
}

/* Epígrafe: más discreto que la dedicatoria y sangrado. */
div.epigrafe {
  font-style: italic;
  margin: 3em 1.5em;
  line-height: 1.5;
}

/* Página de créditos: cuerpo menor, como es costumbre, para que no compita con
 * el contenido. */
div.licencia {
  font-size: 0.9em;
}

/* Los rótulos de sección de la página de créditos. En el .qmd son encabezados
 * de nivel 2 marcados unnumbered y unlisted, y no negrita suelta, justamente
 * para poder engancharlos desde aquí: a una negrita no hay forma de darle
 * estilo. El PDF los compone con su propia regla en preliminares.typ. */
div.licencia h2 {
  font-size: 0.95em;
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #0074D9;
  margin: 1.6em 0 0.2em 0;
  padding-bottom: 0.25em;
  border-bottom: 1px solid #ccc;
}

/* Las condiciones de la licencia. En el PDF van a dos columnas; aquí se apilan
 * a propósito: el EPUB es reflowable y dos columnas en una pantalla estrecha se
 * leen peor que dos listas seguidas. Cada columna conserva su rótulo, así que
 * apiladas se entienden solas. */
div.dos-columnas div.columna {
  margin-bottom: 0.6em;
}

/* La banda con el nombre de la licencia. Sin los iconos de Creative Commons que
 * lleva el PDF: son glifos de FontAwesome, que aquí no hay. El nombre de la
 * licencia va en el texto, así que no se pierde nada. */
div.licencia-cc {
  background-color: #eaf2fb;
  border-radius: 3px;
  padding: 0.6em 0.8em;
  margin: 0.5em 0 0.9em 0;
}

/* La exención de responsabilidad. NO es una admonition: la colección tiene
 * cuatro categorías de recuadro —Seguridad, Normativa, Regla de oro,
 * Airmanship— y son una taxonomía cerrada del temario, a la que un aviso legal
 * no pertenece. Toma prestada la paleta de Seguridad, que es la que el ojo ya
 * asocia a «cuidado» en este libro. */
div.aviso-legal {
  background-color: #fcefdc;
  border: 1px solid #EB9113;
  border-radius: 4px;
  padding: 0.7em 0.9em;
  margin: 0.5em 0 0.9em 0;
}

/* El aval institucional: gris, porque informa, no advierte. */
div.aval {
  background-color: #f3f3f3;
  border-left: 3px solid #0074D9;
  border-radius: 0 2px 2px 0;
  padding: 0.7em 0.9em;
  margin: 0.5em 0 0.9em 0;
}

/* Marca «Más allá del examen»: la sección avanzada entera —encabezado y
 * subsecciones— sobre gris, para que se vea de un golpe qué no es materia de
 * examen. Mismo gris que el PDF (luma 243).
 *
 * Se estilan `section` y `div` porque el div de Pandoc se funde con la sección
 * al escribir HTML: `::: {.mas-alla}` + `## Título` sale como
 * un elemento section con esa clase, no un div dentro. Con sólo `div.mas-alla`
 * el EPUB se quedaría sin fondo, en silencio. */
section.mas-alla,
div.mas-alla {
  background-color: #f3f3f3;
  border-radius: 2px;
  padding: 0.6em 0.9em;
  margin: 1.2em 0;
}

/* La entradilla: violeta y cuerpo menor, como el rol `mas-alla-tag` del tema
 * AsciiDoc original. Es un color distinto de los cuatro de las admonitions a
 * propósito, para que no se confunda con ellas. */
.mas-alla-tag {
  color: #6a1b9a;
  font-weight: bold;
  font-size: 0.85em;
}

/* Créditos de los reconocimientos: nombre destacado y, debajo y sangradas, las
 * titulaciones. Pandoc emite la lista de definición como dl/dt/dd, así
 * que aquí no hace falta marcado propio: sólo darle el mismo aspecto que en el
 * PDF. El dd ya viene sangrado por el navegador; se fija el margen para no
 * depender de su valor por defecto. */
div.creditos dt {
  font-weight: 600;
  font-size: 1.05em;
  margin-top: 1.1em;
}

div.creditos dd {
  margin: 0.2em 0 0 1.5em;
  font-size: 0.85em;
  color: #5a5a5a;
}

div.creditos dd p {
  margin: 0.15em 0;
}

/* Colofón: notas de producción al cierre del libro. */
div.colofon {
  text-align: center;
  font-size: 0.9em;
  margin-top: 3em;
  line-height: 1.5;
}

/* Contracubierta. En el PDF la compone lib.typ como página a sangre; el EPUB no
 * tiene dorso, así que va como última página del flujo. La imagen es la misma. */
img.contracubierta {
  width: 100%;
  max-width: 100%;
  height: auto;
  margin: 0;
  padding: 0;
}

/* Aviso de estado en el EPUB. En el PDF, el estado se ve con la marca de agua
 * diagonal y la nota de la portadilla; un EPUB no tiene página fija ni admite
 * marca, así que el aviso va como bloque destacado al principio del libro.
 * El texto lo inyecta el Makefile, que es donde se deduce de la versión. */
div.estado {
  border: 2px solid #B41E1E;
  border-radius: 4px;
  background-color: #FDF0F0;
  color: #B41E1E;
  padding: 0.8em 1em;
  margin: 0 0 1.5em 0;
  font-size: 1em;
}
</style>
