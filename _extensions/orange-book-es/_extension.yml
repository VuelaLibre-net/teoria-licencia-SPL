title: Typst Orange Book Format (es)
author: Quarto
version: 0.1.0
quarto-required: ">=1.9.17"
contributes:
  formats:
    typst:
      include-in-header:
        - glosario.typ
        - postit.typ
      template-partials:
        - numbering.typ
        - page.typ
        - typst-show.typ
      filters:
        - path: orange-book.lua
          at: post-quarto
        - path: postit.lua
          at: post-quarto
