project:
  type: book
  output-dir: _book

lang: es
version: "1.0-rc.5"
repo-url: "https://github.com/VuelaLibre-net/teoria-licencia-SPL"
cubierta: "cover/frente.jpg"
contracubierta: "cover/reverso.jpg"

book:
  title: "Meteorología"
  author: "VuelaLibre.net"
  chapters:
    - index.qmd
    - licencia.qmd
    - dedicatoria.qmd
    - epigrafe.qmd
    - reconocimientos.qmd
    - introduccion.qmd
    - cap01-la-atmosfera.qmd
    - cap02-viento.qmd
    - cap03-termodinamica.qmd
    - cap04-nubes-y-niebla.qmd
    - cap05-precipitacion.qmd
    - cap06-masas-de-aire-y-frentes.qmd
    - cap07-sistemas-de-presion.qmd
    - cap08-climatologia.qmd
    - cap09-peligros-para-el-vuelo.qmd
    - cap10-informacion-meteorologica.qmd
  appendices:
    - apendice-syllabus-oficial-easa---meteorologia.qmd
    - glosario.qmd
    - bibliografia.qmd
    - colofon.qmd
    - contracubierta.qmd

format:
  orange-book-es-typst:
    toc: true
    number-sections: true
    keep-typ: true
    margin:
      top: 2.5cm
      bottom: 2.5cm
  epub:
    # Los .qmd llevan la marca GUÍA-DE-LECTURA como comentario HTML, para el
    # editor. Typst los descarta solos; el EPUB los arrastraría al entregable.
    strip-comments: true
    toc: true
    epub-cover-image: cover/frente.jpg
    include-in-header: _extensions/orange-book-es/epub-estilos.html
