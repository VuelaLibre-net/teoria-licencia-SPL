name: Compilar Manuales SPL (CI)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar repositorio
      uses: actions/checkout@v4

    - name: Configurar Quarto
      uses: quarto-dev/quarto-actions/setup@v2
      with:
        version: '1.4.549'

    - name: Compilar manuales a PDF y EPUB
      run: |
        mkdir -p build/pdf build/epub
        for libro in 01-derecho-aereo-atc 02-factores-humanos 03-meteorologia 04-comunicaciones 05-principios-vuelo 06-procedimientos-operativos 07-planificacion-rendimiento 08-aeronave-sistemas 09-navegacion; do
          echo "==> Renderizando $libro a PDF (Typst)..."
          quarto render "$libro/" --to orange-book-es-typst
          mv "$libro/_book"/*.pdf build/pdf/
          
          echo "==> Renderizando $libro a EPUB..."
          quarto render "$libro/" --to epub
          mv "$libro/_book"/*.epub build/epub/
        done

    - name: Subir artefactos PDF
      uses: actions/upload-artifact@v4
      with:
        name: manuales-spl-pdf
        path: build/pdf/

    - name: Subir artefactos EPUB
      uses: actions/upload-artifact@v4
      with:
        name: manuales-spl-epub
        path: build/epub/
