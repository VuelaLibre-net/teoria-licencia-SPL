name: Compilar Manuales SPL (CI)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  # Debe cumplir el quarto-required de _extensions/orange-book-es/_extension.yml.
  # Con versiones anteriores, Quarto ignora la extensión y maqueta con su
  # orange-book interno: los PDF salen en inglés y sin errores que lo delaten.
  QUARTO_VERSION: '1.9.38'
  # Quarto lleva empotrado Typst 0.14.2, que pagina distinto. Se fija el mismo
  # que se usa en local para que los artefactos sean reproducibles.
  TYPST_VERSION: '0.15.0'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar repositorio
      uses: actions/checkout@v4
      with:
        # El colofón fecha cada libro con el último commit que lo tocó, y el
        # clonado por defecto es superficial: sin historia, git log no
        # encontraría ese commit y la fecha saldría mal.
        fetch-depth: 0

    - name: Configurar Quarto
      uses: quarto-dev/quarto-actions/setup@v2
      with:
        version: ${{ env.QUARTO_VERSION }}

    - name: Configurar Typst
      run: |
        curl -fsSL --retry 3 \
          "https://github.com/typst/typst/releases/download/v${TYPST_VERSION}/typst-x86_64-unknown-linux-musl.tar.xz" \
          | tar -xJ
        echo "QUARTO_TYPST=$PWD/typst-x86_64-unknown-linux-musl/typst" >> "$GITHUB_ENV"

    - name: Instalar utilidades de verificación
      # poppler-utils da pdftotext; unzip abre los EPUB. Se instalan en vez de
      # suponer que el runner los trae.
      run: sudo apt-get update -qq && sudo apt-get install -y -qq poppler-utils unzip

    - name: Comprobar el entorno
      run: |
        quarto --version
        "$QUARTO_TYPST" --version
        # La extensión debe estar visible desde el proyecto; si el symlink
        # _extensions no se ha clonado, Quarto usaría el orange-book interno.
        # 'quarto list' sólo mira el directorio actual (de ahí el cd) y escribe
        # en stderr (de ahí el 2>&1).
        (cd 08-aeronave-sistemas && quarto list extensions 2>&1) | grep -q 'orange-book-es' \
          || { echo "::error::orange-book-es no visible; ¿falta el symlink _extensions?"; exit 1; }

    - name: Comprobar que los preliminares no divergen
      # licencia.qmd, dedicatoria.qmd, colofon.qmd y reconocimientos.qmd son
      # idénticos en los 9 libros, pero por convención: son 9 copias y no hay
      # nada que las sincronice. Editar uno y olvidar los demás deja la
      # colección incoherente sin que ningún otro guardián lo note, porque cada
      # libro compila bien.
      #
      # epigrafe.qmd NO está en esta lista: desde que cada libro tiene su propia
      # cita, ser idénticos sería el fallo. Se comprueba justo lo contrario más
      # abajo.
      #
      # Va antes de compilar: es una comprobación sobre las fuentes y así falla
      # en segundos en vez de tras cuatro minutos de render.
      run: |
        errores=0
        for f in licencia.qmd dedicatoria.qmd colofon.qmd reconocimientos.qmd; do
          copias=$(ls -1 0*/"$f" 2>/dev/null | wc -l)
          if [ "$copias" -ne 9 ]; then
            echo "::error::Hay $copias copias de $f y se esperan 9: ¿falta en algún libro?"
            errores=1
            continue
          fi
          firmas=$(md5sum 0*/"$f" | awk '{print $1}' | sort -u | wc -l)
          if [ "$firmas" -ne 1 ]; then
            echo "::error::$f difiere entre libros ($firmas versiones distintas). Se edita uno y se propaga a los otros 8."
            md5sum 0*/"$f" | sed 's/^/    /'
            errores=1
          fi
        done
        # epigrafe.qmd es el caso inverso: cada libro abre con SU cita, elegida
        # para su asignatura. Dos libros con la misma cita significa que alguien
        # propagó un epígrafe encima de otro, que es justo lo que hay que hacer
        # con los demás preliminares. Nadie lo notaría: los dos libros compilan.
        firmas=$(md5sum 0*/epigrafe.qmd | awk '{print $1}' | sort -u | wc -l)
        if [ "$firmas" -ne 9 ]; then
          echo "::error::Sólo hay $firmas epígrafes distintos y deben ser 9: cada libro tiene su cita."
          md5sum 0*/epigrafe.qmd | sort | sed 's/^/    /'
          errores=1
        fi

        # introduccion.qmd es mixto: la cabecera es propia de cada libro (el
        # gancho del tema) y, desde la marca GUÍA-DE-LECTURA hasta el final, la
        # guía de lectura es idéntica en los 9. El md5 del fichero entero no
        # sirve aquí, así que se compara sólo la cola.
        colas=$(mktemp -d)
        for libro in 0*/; do
          awk '/GUÍA-DE-LECTURA/{f=1} f' "$libro/introduccion.qmd" > "$colas/${libro%/}"
          # Sin esta comprobación, un fichero sin la marca daría una cola vacía;
          # nueve colas vacías son idénticas y el guardián pasaría EN VACÍO.
          if [ ! -s "$colas/${libro%/}" ]; then
            echo "::error file=$libro/introduccion.qmd::Falta la marca GUÍA-DE-LECTURA: la guía no se puede comparar"
            errores=1
          fi
        done
        firmas=$(md5sum "$colas"/* 2>/dev/null | awk '{print $1}' | sort -u | wc -l)
        if [ "$firmas" -ne 1 ]; then
          echo "::error::La guía de lectura difiere entre libros ($firmas versiones). Se edita una y se propaga a las otras 8."
          md5sum "$colas"/* | sed 's/^/    /'
          errores=1
        fi
        rm -rf "$colas"
        exit $errores

    - name: Comprobar que cada libro registra su versión en curso
      # El CHANGELOG sólo sirve si está al día, y un CHANGELOG desfasado no da
      # ningún síntoma: el libro compila igual. Aquí se exige que la versión que
      # hoy tiene el libro tenga su entrada, así que subir `version:` sin contar
      # qué cambió rompe la compilación. Es el único punto en que el registro
      # deja de ser voluntario.
      #
      # No se comprueba el contenido de la entrada: eso es criterio editorial y
      # no lo puede juzgar un grep.
      run: |
        errores=0
        make -s estados > estados.txt \
          || { echo '::error::«make estados» ha fallado; el guardián no puede comprobar nada'; exit 1; }
        leidos=$(wc -l < estados.txt)
        [ "$leidos" -eq 9 ] \
          || { echo "::error::«make estados» ha devuelto $leidos libros y se esperan 9"; exit 1; }
        while IFS='|' read -r libro version estado; do
          fichero="$libro/CHANGELOG-${libro%%-*}.md"
          if [ ! -f "$fichero" ]; then
            echo "::error::Falta $fichero"
            errores=1
            continue
          fi
          # La entrada se escribe "## [1.0-rc.5] — 16 de julio de 2026". Se
          # busca con -F: la versión lleva puntos, que en una regex casarían con
          # cualquier carácter y darían por buena una entrada equivocada.
          if ! grep -qF -- "## [$version]" "$fichero"; then
            echo "::error file=$fichero::El libro va por la versión $version y no hay entrada «## [$version]». Registra qué cambió."
            echo "    Entradas presentes:"
            grep -oE '^## \[[^]]+\]' "$fichero" | head -3 | sed 's/^/      /'
            errores=1
          fi
        done < estados.txt
        rm -f estados.txt
        exit $errores

    - name: Comprobar que la tabla del README no está desfasada
      # El README publica la versión y el estado de los 9 libros, que es una
      # copia de lo que vive en cada _quarto.yml. Cuando un libro cambia de
      # versión, el PDF y el EPUB se enteran solos —el Makefile se lo inyecta—
      # pero el README no: se queda mintiendo en verde, sin que nada falle.
      #
      # `make estados` es la misma fuente que alimenta los entregables, no una
      # reimplementación: si divergiera de ella, el guardián no valdría nada.
      run: |
        errores=0
        # Se materializa la tabla antes de recorrerla: si `make estados` falla o
        # deja de existir, el bucle no leería nada y el guardián pasaría EN
        # VACÍO, en verde y sin comprobar nada. Exigir las 9 líneas cierra ese
        # agujero, que es el mismo que se vigila aquí.
        make -s estados > estados.txt \
          || { echo '::error::«make estados» ha fallado; el guardián no puede comprobar nada'; exit 1; }
        leidos=$(wc -l < estados.txt)
        [ "$leidos" -eq 9 ] \
          || { echo "::error::«make estados» ha devuelto $leidos libros y se esperan 9"; exit 1; }
        # El bucle NO va detrás de una tubería: en un subshell, los errores que
        # contase se perderían al terminar. Así se informa de los 9 libros de
        # una vez en vez de abortar en el primero.
        while IFS='|' read -r libro version estado; do
          fila=$(grep -F -- "\`$libro\`" README.md) || {
            echo "::error file=README.md::El README no menciona $libro"; errores=1; continue; }
          echo "$fila" | grep -qF -- "\`$version\`" \
            || { echo "::error file=README.md::$libro: el README no publica la versión $version"; errores=1; }
          echo "$fila" | grep -qF -- "$estado" \
            || { echo "::error file=README.md::$libro ($version): el README no publica el estado «$estado»"; errores=1; }
        done < estados.txt
        rm -f estados.txt
        exit $errores

    - name: Compilar manuales a PDF y EPUB
      run: make

    - name: Verificar los entregables
      run: |
        errores=0

        # Los entregables se llaman <libro>-<versión>-<yy-mm-dd>.pdf, así que el
        # nombre del fichero ya NO es el del directorio del libro. Partirlo por
        # guiones no vale: el slug del libro lleva guiones y la versión también
        # (1.0-rc.5). Se resuelve contra los directorios que existen, que es la
        # única fuente cierta.
        #
        # Devolver el libro equivocado —o vacío— no daría error: los guardianes
        # leerían un _quarto.yml inexistente, se quedarían con la versión vacía
        # y evaluarían el estado contra la nada, en verde.
        libro_de() {
          base=$(basename "$1")
          for d in 0*/; do
            d=${d%/}
            case "$base" in "$d"-*) echo "$d"; return 0 ;; esac
          done
          return 1
        }

        for pdf in build/pdf/*.pdf; do
          texto=$(pdftotext "$pdf" - 2>/dev/null)

          # Sin esta comprobación, un pdftotext que fallara dejaría $texto vacío:
          # los greps de abajo no encontrarían nada y el paso pasaría en verde
          # sin haber verificado absolutamente nada.
          if [ "${#texto}" -lt 1000 ]; then
            echo "::error file=$pdf::No se pudo extraer texto (${#texto} bytes); la verificación no sería concluyente"
            errores=1
            continue
          fi

          # En positivo: la extensión se aplicó de verdad. Comprobar sólo la
          # ausencia de 'Chapter' pasaría también con un PDF vacío o truncado.
          if ! grep -qE 'Capítulo [0-9]+\.' <<<"$texto"; then
            echo "::error file=$pdf::No aparece 'Capítulo N': la extensión orange-book-es no se aplicó"
            errores=1
          fi

          # El índice se emite desde un show rule que reconoce el encabezado
          # "Cómo leer este libro" (`front-matter-end` en lib.typ). Si alguien
          # lo renombra en el .qmd sin cambiarlo allí, el libro sale sin índice
          # y sin ningún error: durante meses se publicó con el índice al final.
          # Se detecta por los puntos guía de las entradas.
          if ! grep -q '\. \. \. \.' <<<"$texto"; then
            echo "::error file=$pdf::Sin índice: ¿el H1 de introduccion.qmd ya no casa con front-matter-end en lib.typ?"
            errores=1
          fi

          # El colofón se fecha con git, así que un clonado superficial lo
          # dejaría sin fecha. Se comprueba que esté y que la fecha se haya
          # resuelto: si el shortcode no resolviera, quedaría el literal.
          if ! grep -q 'Última actualización: [0-9]' <<<"$texto"; then
            echo "::error file=$pdf::Colofón sin fecha: ¿falta fetch-depth: 0 en el checkout?"
            errores=1
          fi

          # La portadilla lleva "Versión X · <fecha>". Es la página 3: la 1 es la
          # cubierta (una imagen, sin texto) y la 2 su dorso en blanco.
          #
          # Si esos datos se pasaran por el campo `date`, Quarto intentaría
          # parsearlos como fecha y escribiría "Invalid Date", tan tranquilo.
          portadilla=$(pdftotext -f 3 -l 3 "$pdf" - 2>/dev/null)
          if grep -q 'Invalid Date' <<<"$portadilla"; then
            echo "::error file=$pdf::'Invalid Date' en la portadilla: ¿se metió texto libre en el campo 'date'?"
            errores=1
          fi
          if ! grep -qE 'Versión [0-9]+\.[0-9]+' <<<"$portadilla"; then
            echo "::error file=$pdf::La portadilla (pág. 3) no lleva la versión del libro"
            errores=1
          fi

          # Estado editorial: sólo los libros completados salen sin nota. Se
          # comprueba la NOTA de la portadilla, no la marca de agua: aquella es
          # texto legible y ésta va rotada, así que pdftotext la extrae con las
          # letras desordenadas y no hay forma de buscarla.
          #
          # Completado = mayor >= 1 y sin sufijo de pre-lanzamiento: un 1.0-rc.4
          # es ANTERIOR a la 1.0.0, no posterior.
          libro=$(libro_de "$pdf") || { echo "::error::No sé a qué libro corresponde $pdf"; errores=1; continue; }
          version=$(sed -n 's/^version: *"\{0,1\}\([^"]*\)"\{0,1\}/\1/p' "$libro/_quarto.yml" | head -1)
          mayor=${version%%.*}
          case "$version" in *-*) pre=1 ;; *) pre=0 ;; esac
          etiquetas='EN REVISIÓN|CREANDO ILUSTRACIONES|EN DESARROLLO'
          if [ "${mayor:-0}" -ge 1 ] 2>/dev/null && [ "$pre" -eq 0 ]; then
            if grep -qE "$etiquetas" <<<"$portadilla"; then
              echo "::error file=$pdf::Versión $version es un libro completado y no debe llevar nota de estado"
              errores=1
            fi
          else
            if ! grep -qE "$etiquetas" <<<"$portadilla"; then
              echo "::error file=$pdf::Versión $version no está completada y la portadilla no lleva su nota de estado"
              errores=1
            fi
          fi

          # Cubierta y contracubierta: páginas de imagen a sangre, primera y
          # última. Se cuentan las imágenes, no el texto: no llevan ninguno.
          paginas=$(pdfinfo "$pdf" 2>/dev/null | awk '/^Pages/{print $2}')
          if [ "$(pdfimages -list -f 1 -l 1 "$pdf" 2>/dev/null | grep -c image)" -lt 1 ]; then
            echo "::error file=$pdf::La página 1 no lleva la imagen de cubierta"
            errores=1
          fi
          if [ "$(pdfimages -list -f "$paginas" -l "$paginas" "$pdf" 2>/dev/null | grep -c image)" -lt 1 ]; then
            echo "::error file=$pdf::La última página no lleva la contracubierta"
            errores=1
          fi

          # Y en negativo: ni rastro de los rótulos por defecto de Quarto.
          if grep -qE 'Chapter [0-9]' <<<"$texto"; then
            echo "::error file=$pdf::Rótulos en inglés ('Chapter N'): se maquetó con el orange-book interno"
            errores=1
          fi

          # Las admonitions traen su etiqueta en el título, no en el cuerpo.
          if grep -q '[⚠⚖✦⚓]' <<<"$texto"; then
            echo "::error file=$pdf::Iconos de admonition en el cuerpo del PDF"
            errores=1
          fi

          # Marcado de Markdown impreso literalmente. Pasa cuando se anidan
          # negritas ('**A (**B**)**') o se indenta prosa 4 espacios, que la
          # convierte en bloque de código. Nada de eso debe llegar al PDF.
          if grep -q '\*\*' <<<"$texto"; then
            echo "::error file=$pdf::Asteriscos literales en el PDF: hay marcado sin interpretar"
            grep -o '.\{0,40\}\*\*.\{0,40\}' <<<"$texto" | head -3 | sed 's/^/    /'
            errores=1
          fi
        done

        # Los EPUB también se comprueban. Hasta ahora sólo se miraban los PDF, y
        # por eso se publicaron nueve EPUB con los shortcodes del colofón sin
        # resolver ("?meta:version-quarto"): el CI pasaba en verde porque el
        # fallo estaba en el formato que nadie miraba.
        for epub in build/epub/*.epub; do
          crudo=$(unzip -p "$epub" 'EPUB/text/*.xhtml' 2>/dev/null)
          texto=$(sed -e 's/<[^>]*>//g' <<<"$crudo")

          # Comentarios del .qmd colados en el entregable. Los descarta
          # `strip-comments: true` en el bloque epub de cada _quarto.yml; Typst
          # los tira solo. Se busca en el XHTML CRUDO a propósito: $texto ya ha
          # perdido las etiquetas —y con ellas los comentarios—, así que un
          # grep sobre él no encontraría esto jamás.
          if grep -q 'GUÍA-DE-LECTURA' <<<"$crudo"; then
            echo "::error file=$epub::La marca GUÍA-DE-LECTURA se ha colado en el EPUB; ¿falta strip-comments en su _quarto.yml?"
            errores=1
          fi

          # Un EPUB es XHTML y debe estar bien formado como XML. No es una
          # formalidad: un parser XML SÍ interpreta las etiquetas dentro de
          # <style>, al revés que HTML5, que lo trata como texto. Un `<div…>`
          # escrito dentro de un comentario CSS abre un elemento que nunca
          # cierra y deja el documento mal formado.
          #
          # Nueve EPUB se publicaron así. Quarto compilaba sin rechistar, y el
          # resto de guardianes miran $texto, del que sed ya ha quitado las
          # etiquetas: ninguno podía verlo.
          if ! python3 "$GITHUB_WORKSPACE/.github/comprobar-xml.py" "$epub"; then
            echo "::error file=$epub::XHTML mal formado; un lector estricto puede rechazarlo"
            errores=1
          fi

          if [ "${#texto}" -lt 1000 ]; then
            echo "::error file=$epub::No se pudo extraer texto (${#texto} bytes); la verificación no sería concluyente"
            errores=1
            continue
          fi

          # Shortcode sin resolver: Quarto escribe '?meta:<clave>' y sigue.
          if grep -q '?meta:' <<<"$texto"; then
            echo "::error file=$epub::Shortcode de metadatos sin resolver; ¿falta un --metadata al renderizar?"
            grep -o '.\{0,30\}?meta:.\{0,20\}' <<<"$texto" | head -2 | sed 's/^/    /'
            errores=1
          fi

          if grep -q '\*\*' <<<"$texto"; then
            echo "::error file=$epub::Asteriscos literales en el EPUB"
            errores=1
          fi

          if grep -q '[⚠⚖✦⚓]' <<<"$texto"; then
            echo "::error file=$epub::Iconos de admonition en el cuerpo del EPUB"
            errores=1
          fi

          # Los estilos propios se inyectan con include-in-header. Si alguien los
          # pasara con la opción `css:` del formato epub, REEMPLAZARÍA la hoja
          # por defecto de Quarto en vez de sumarse: el EPUB se quedaría sin las
          # reglas de blockquote, code, h1-h6 o las notas al pie, y seguiría
          # compilando tan campante. Se comprueba que estén las dos cosas.
          if ! unzip -p "$epub" 'EPUB/text/ch001.xhtml' 2>/dev/null | grep -q 'FFF9C4'; then
            echo "::error file=$epub::Sin los estilos propios: el post-it no tendrá fondo amarillo"
            errores=1
          fi
          selectores=$(unzip -p "$epub" 'EPUB/styles/*.css' 2>/dev/null | grep -cE '^[a-zA-Z][^{]*\{')
          if [ "$selectores" -lt 30 ]; then
            echo "::error file=$epub::Sólo $selectores selectores en la hoja por defecto (se esperan 40+): ¿se usó 'css:' en vez de include-in-header?"
            errores=1
          fi

          # La cubierta la declara epub-cover-image. La contracubierta no existe
          # como concepto en EPUB —es un formato de flujo, sin dorso—, así que va
          # como última página con `content-visible when-format="epub"`.
          if ! unzip -p "$epub" 'EPUB/content.opf' 2>/dev/null | grep -q 'properties="cover-image"'; then
            echo "::error file=$epub::El EPUB no declara cubierta: ¿falta epub-cover-image?"
            errores=1
          fi
          if ! unzip -p "$epub" 'EPUB/text/*.xhtml' 2>/dev/null | grep -q 'class="contracubierta"'; then
            echo "::error file=$epub::El EPUB no lleva contracubierta"
            errores=1
          fi

          # Estado editorial, igual que en el PDF. El EPUB no admite marca de
          # agua, así que el aviso va como bloque al principio; pero tiene que
          # estar: quien descargue un EPUB debe saber si el libro está terminado.
          libro=$(libro_de "$epub") || { echo "::error::No sé a qué libro corresponde $epub"; errores=1; continue; }
          version=$(sed -n 's/^version: *"\{0,1\}\([^"]*\)"\{0,1\}/\1/p' "$libro/_quarto.yml" | head -1)
          mayor=${version%%.*}
          case "$version" in *-*) pre=1 ;; *) pre=0 ;; esac
          etiquetas='En revisión|Creando ilustraciones|En desarrollo'
          if [ "${mayor:-0}" -ge 1 ] 2>/dev/null && [ "$pre" -eq 0 ]; then
            if grep -qE "$etiquetas" <<<"$texto"; then
              echo "::error file=$epub::Versión $version es un libro completado y no debe llevar aviso de estado"
              errores=1
            fi
          else
            if ! grep -qE "$etiquetas" <<<"$texto"; then
              echo "::error file=$epub::Versión $version no está completada y el EPUB no lleva su aviso de estado"
              errores=1
            fi
          fi
        done

        pdfs=$(ls build/pdf/*.pdf 2>/dev/null | wc -l)
        epubs=$(ls build/epub/*.epub 2>/dev/null | wc -l)
        [ "$pdfs" -eq 9 ] || { echo "::error::Se esperaban 9 PDF y hay $pdfs"; errores=1; }
        [ "$epubs" -eq 9 ] || { echo "::error::Se esperaban 9 EPUB y hay $epubs"; errores=1; }

        exit $errores

    - name: Subir artefactos PDF
      uses: actions/upload-artifact@v4
      with:
        name: manuales-spl-pdf
        path: build/pdf/

    - name: Subir artefactos EPUB
      uses: actions/upload-artifact@v4
      with:
        name: manuales-spl-epub
        path: build/epub/
