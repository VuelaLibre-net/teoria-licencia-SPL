name: Compilar Manuales SPL (CI)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  # Debe cumplir el quarto-required de _extensions/orange-book-es/_extension.yml.
  # Con versiones anteriores, Quarto ignora la extensiĂłn y maqueta con su
  # orange-book interno: los PDF salen en inglĂ©s y sin errores que lo delaten.
  QUARTO_VERSION: '1.9.38'
  # Quarto lleva empotrado Typst 0.14.2, que pagina distinto. Se fija el mismo
  # que se usa en local para que los artefactos sean reproducibles.
  TYPST_VERSION: '0.15.0'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar repositorio
      uses: actions/checkout@v4
      with:
        # El colofĂłn fecha cada libro con el Ăşltimo commit que lo tocĂł, y el
        # clonado por defecto es superficial: sin historia, git log no
        # encontrarĂ­a ese commit y la fecha saldrĂ­a mal.
        fetch-depth: 0

    - name: Configurar Quarto
      uses: quarto-dev/quarto-actions/setup@v2
      with:
        version: ${{ env.QUARTO_VERSION }}

    - name: Configurar Typst
      run: |
        curl -fsSL --retry 3 \
          "https://github.com/typst/typst/releases/download/v${TYPST_VERSION}/typst-x86_64-unknown-linux-musl.tar.xz" \
          | tar -xJ
        echo "QUARTO_TYPST=$PWD/typst-x86_64-unknown-linux-musl/typst" >> "$GITHUB_ENV"

    - name: Instalar utilidades de verificaciĂłn
      # poppler-utils da pdftotext; unzip abre los EPUB. Se instalan en vez de
      # suponer que el runner los trae.
      run: sudo apt-get update -qq && sudo apt-get install -y -qq poppler-utils unzip

    - name: Comprobar el entorno
      run: |
        quarto --version
        "$QUARTO_TYPST" --version
        # La extensiĂłn debe estar visible desde el proyecto; si el symlink
        # _extensions no se ha clonado, Quarto usarĂ­a el orange-book interno.
        # 'quarto list' sĂłlo mira el directorio actual (de ahĂ­ el cd) y escribe
        # en stderr (de ahĂ­ el 2>&1).
        (cd 08-aeronave-sistemas && quarto list extensions 2>&1) | grep -q 'orange-book-es' \
          || { echo "::error::orange-book-es no visible; Âżfalta el symlink _extensions?"; exit 1; }

    - name: Compilar manuales a PDF y EPUB
      run: make

    - name: Verificar los entregables
      run: |
        errores=0
        for pdf in build/pdf/*.pdf; do
          texto=$(pdftotext "$pdf" - 2>/dev/null)

          # Sin esta comprobaciĂłn, un pdftotext que fallara dejarĂ­a $texto vacĂ­o:
          # los greps de abajo no encontrarĂ­an nada y el paso pasarĂ­a en verde
          # sin haber verificado absolutamente nada.
          if [ "${#texto}" -lt 1000 ]; then
            echo "::error file=$pdf::No se pudo extraer texto (${#texto} bytes); la verificaciĂłn no serĂ­a concluyente"
            errores=1
            continue
          fi

          # En positivo: la extensiĂłn se aplicĂł de verdad. Comprobar sĂłlo la
          # ausencia de 'Chapter' pasarĂ­a tambiĂ©n con un PDF vacĂ­o o truncado.
          if ! grep -qE 'CapĂ­tulo [0-9]+\.' <<<"$texto"; then
            echo "::error file=$pdf::No aparece 'CapĂ­tulo N': la extensiĂłn orange-book-es no se aplicĂł"
            errores=1
          fi

          # El Ă­ndice se emite desde un show rule que reconoce el encabezado
          # "IntroducciĂłn". Si alguien lo renombra, el libro sale sin Ă­ndice y
          # sin ningĂşn error: durante meses se publicĂł con el Ă­ndice al final.
          # Se detecta por los puntos guĂ­a de las entradas.
          if ! grep -q '\. \. \. \.' <<<"$texto"; then
            echo "::error file=$pdf::Sin Ă­ndice: Âżse renombrĂł el encabezado 'IntroducciĂłn'?"
            errores=1
          fi

          # El colofĂłn se fecha con git, asĂ­ que un clonado superficial lo
          # dejarĂ­a sin fecha. Se comprueba que estĂ© y que la fecha se haya
          # resuelto: si el shortcode no resolviera, quedarĂ­a el literal.
          if ! grep -q 'Ăšltima actualizaciĂłn: [0-9]' <<<"$texto"; then
            echo "::error file=$pdf::ColofĂłn sin fecha: Âżfalta fetch-depth: 0 en el checkout?"
            errores=1
          fi

          # La portada lleva "VersiĂłn X Â· <fecha>". Si esos datos se pasaran por
          # el campo `date`, Quarto intentarĂ­a parsearlos como fecha y escribirĂ­a
          # "Invalid Date" en la cubierta, tan tranquilo.
          portada=$(pdftotext -f 1 -l 1 "$pdf" - 2>/dev/null)
          if grep -q 'Invalid Date' <<<"$portada"; then
            echo "::error file=$pdf::'Invalid Date' en la portada: Âżse metiĂł texto libre en el campo 'date'?"
            errores=1
          fi
          if ! grep -qE 'VersiĂłn [0-9]+\.[0-9]+' <<<"$portada"; then
            echo "::error file=$pdf::La portada no lleva la versiĂłn del libro"
            errores=1
          fi

          # Y en negativo: ni rastro de los rĂłtulos por defecto de Quarto.
          if grep -qE 'Chapter [0-9]' <<<"$texto"; then
            echo "::error file=$pdf::RĂłtulos en inglĂ©s ('Chapter N'): se maquetĂł con el orange-book interno"
            errores=1
          fi

          # Las admonitions traen su etiqueta en el tĂ­tulo, no en el cuerpo.
          if grep -q '[âš âš–âś¦âš“]' <<<"$texto"; then
            echo "::error file=$pdf::Iconos de admonition en el cuerpo del PDF"
            errores=1
          fi

          # Marcado de Markdown impreso literalmente. Pasa cuando se anidan
          # negritas ('**A (**B**)**') o se indenta prosa 4 espacios, que la
          # convierte en bloque de cĂłdigo. Nada de eso debe llegar al PDF.
          if grep -q '\*\*' <<<"$texto"; then
            echo "::error file=$pdf::Asteriscos literales en el PDF: hay marcado sin interpretar"
            grep -o '.\{0,40\}\*\*.\{0,40\}' <<<"$texto" | head -3 | sed 's/^/    /'
            errores=1
          fi
        done

        # Los EPUB tambiĂ©n se comprueban. Hasta ahora sĂłlo se miraban los PDF, y
        # por eso se publicaron nueve EPUB con los shortcodes del colofĂłn sin
        # resolver ("?meta:version-quarto"): el CI pasaba en verde porque el
        # fallo estaba en el formato que nadie miraba.
        for epub in build/epub/*.epub; do
          texto=$(unzip -p "$epub" 'EPUB/text/*.xhtml' 2>/dev/null | sed -e 's/<[^>]*>//g')

          if [ "${#texto}" -lt 1000 ]; then
            echo "::error file=$epub::No se pudo extraer texto (${#texto} bytes); la verificaciĂłn no serĂ­a concluyente"
            errores=1
            continue
          fi

          # Shortcode sin resolver: Quarto escribe '?meta:<clave>' y sigue.
          if grep -q '?meta:' <<<"$texto"; then
            echo "::error file=$epub::Shortcode de metadatos sin resolver; Âżfalta un --metadata al renderizar?"
            grep -o '.\{0,30\}?meta:.\{0,20\}' <<<"$texto" | head -2 | sed 's/^/    /'
            errores=1
          fi

          if grep -q '\*\*' <<<"$texto"; then
            echo "::error file=$epub::Asteriscos literales en el EPUB"
            errores=1
          fi

          if grep -q '[âš âš–âś¦âš“]' <<<"$texto"; then
            echo "::error file=$epub::Iconos de admonition en el cuerpo del EPUB"
            errores=1
          fi

          # Los estilos propios se inyectan con include-in-header. Si alguien los
          # pasara con la opciĂłn `css:` del formato epub, REEMPLAZARĂŤA la hoja
          # por defecto de Quarto en vez de sumarse: el EPUB se quedarĂ­a sin las
          # reglas de blockquote, code, h1-h6 o las notas al pie, y seguirĂ­a
          # compilando tan campante. Se comprueba que estĂ©n las dos cosas.
          if ! unzip -p "$epub" 'EPUB/text/ch001.xhtml' 2>/dev/null | grep -q 'FFF9C4'; then
            echo "::error file=$epub::Sin los estilos propios: el post-it no tendrĂˇ fondo amarillo"
            errores=1
          fi
          selectores=$(unzip -p "$epub" 'EPUB/styles/*.css' 2>/dev/null | grep -cE '^[a-zA-Z][^{]*\{')
          if [ "$selectores" -lt 30 ]; then
            echo "::error file=$epub::SĂłlo $selectores selectores en la hoja por defecto (se esperan 40+): Âżse usĂł 'css:' en vez de include-in-header?"
            errores=1
          fi
        done

        pdfs=$(ls build/pdf/*.pdf 2>/dev/null | wc -l)
        epubs=$(ls build/epub/*.epub 2>/dev/null | wc -l)
        [ "$pdfs" -eq 9 ] || { echo "::error::Se esperaban 9 PDF y hay $pdfs"; errores=1; }
        [ "$epubs" -eq 9 ] || { echo "::error::Se esperaban 9 EPUB y hay $epubs"; errores=1; }

        exit $errores

    - name: Subir artefactos PDF
      uses: actions/upload-artifact@v4
      with:
        name: manuales-spl-pdf
        path: build/pdf/

    - name: Subir artefactos EPUB
      uses: actions/upload-artifact@v4
      with:
        name: manuales-spl-epub
        path: build/epub/
