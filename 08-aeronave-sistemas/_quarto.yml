project:
  type: book
  output-dir: _book

lang: es
version: "0.8.1"
repo-url: "https://github.com/VuelaLibre-net/teoria-licencia-SPL"
cubierta: "cover/frente.jpg"
contracubierta: "cover/reverso.jpg"

book:
  title: "Conocimientos Generales de la Aeronave"
  author: "VuelaLibre.net"
  chapters:
    - index.qmd
    - licencia.qmd
    - dedicatoria.qmd
    - epigrafe.qmd
    - reconocimientos.qmd
    - introduccion.qmd
    - cap01-estructura.qmd
    - cap02-diseño-de-sistemas-cargas-y-tensiones.qmd
    - cap03-tren-de-aterrizaje-ruedas-neumáticos-y-frenos.qmd
    - cap04-masa-y-centro-de-gravedad.qmd
    - cap05-mandos-de-vuelo.qmd
    - cap06-instrumentos.qmd
    - cap07-montaje-de-la-aeronave-conexión-de-superficies-de-control.qmd
    - cap08-manuales-y-documentos.qmd
    - cap09-aeronavegabilidad-y-mantenimiento.qmd
    - cap10-estructura-motores-y-hélices.qmd
    - cap11-sistemas-de-lastre-con-agua.qmd
    - cap12-baterías.qmd
    - cap13-paracaídas-de-emergencia.qmd
    - cap14-equipo-de-evacuación-de-emergencia.qmd
  appendices:
    - apendice-syllabus-oficial-easa---conocimientos-generales-de-la-aeronave.qmd
    - glosario.qmd
    - bibliografia.qmd
    - colofon.qmd
    - contracubierta.qmd

format:
  orange-book-es-typst:
    toc: true
    number-sections: true
    keep-typ: true
    margin:
      top: 2.5cm
      bottom: 2.5cm
  epub:
    # Los .qmd llevan la marca GUÍA-DE-LECTURA como comentario HTML, para el
    # editor. Typst los descarta solos; el EPUB los arrastraría al entregable.
    strip-comments: true
    toc: true
    epub-cover-image: cover/frente.jpg
    include-in-header: _extensions/orange-book-es/epub-estilos.html
