project:
  type: book
  output-dir: _book

lang: es
version: "0.8.2"
repo-url: "https://github.com/VuelaLibre-net/teoria-licencia-SPL"
cubierta: "cover/frente.jpg"
contracubierta: "cover/reverso.jpg"

book:
  title: "Planificación y Rendimiento de Vuelo"
  author: "VuelaLibre.net"
  chapters:
    - index.qmd
    - licencia.qmd
    - dedicatoria.qmd
    - epigrafe.qmd
    - reconocimientos.qmd
    - introduccion.qmd
    - cap01-masa-y-centro-de-gravedad.qmd
    - cap02-polar-de-velocidades-de-planeadores-o-velocidad-de-crucero.qmd
    - cap03-planificacion-de-vuelo-y-definicion-de-tareas.qmd
    - cap04-plan-de-vuelo-icao.qmd
    - cap05-monitoreo-del-vuelo-y-replanificacion-en-vuelo.qmd
  appendices:
    - apendice-syllabus-oficial-easa---planificacion-y-rendimiento-de-vuelo.qmd
    - glosario.qmd
    - bibliografia.qmd
    - colofon.qmd
    - contracubierta.qmd

format:
  orange-book-es-typst:
    toc: true
    number-sections: true
    keep-typ: true
    margin:
      top: 2.5cm
      bottom: 2.5cm
  epub:
    # Los .qmd llevan la marca GUÍA-DE-LECTURA como comentario HTML, para el
    # editor. Typst los descarta solos; el EPUB los arrastraría al entregable.
    strip-comments: true
    toc: true
    epub-cover-image: cover/frente.jpg
    include-in-header: _extensions/orange-book-es/epub-estilos.html
