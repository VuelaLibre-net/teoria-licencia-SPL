project:
  type: book
  output-dir: _book

lang: es
version: "0.8.2"
repo-url: "https://github.com/VuelaLibre-net/teoria-licencia-SPL"
cubierta: "cover/frente.jpg"
contracubierta: "cover/reverso.jpg"

book:
  title: "Procedimientos Operativos"
  author: "VuelaLibre.net"
  chapters:
    - index.qmd
    - licencia.qmd
    - dedicatoria.qmd
    - epigrafe.qmd
    - reconocimientos.qmd
    - introduccion.qmd
    - cap01-requisitos-generales.qmd
    - cap02-metodos-de-lanzamiento.qmd
    - cap03-tecnicas-de-planeo.qmd
    - cap04-circuitos-y-aterrizaje.qmd
    - cap05-aterrizaje-fuera-de-campo.qmd
    - cap06-procedimientos-operativos-especiales-y-peligros.qmd
    - cap07-procedimientos-de-emergencia.qmd
    - cap08-uso-y-aterrizaje-con-paracaidas-de-emergencia.qmd
  appendices:
    - apendice-syllabus-oficial-easa---procedimientos-operativos.qmd
    - glosario.qmd
    - bibliografia.qmd
    - colofon.qmd
    - contracubierta.qmd

format:
  orange-book-es-typst:
    toc: true
    number-sections: true
    keep-typ: true
    margin:
      top: 2.5cm
      bottom: 2.5cm
  epub:
    # Los .qmd llevan la marca GUÍA-DE-LECTURA como comentario HTML, para el
    # editor. Typst los descarta solos; el EPUB los arrastraría al entregable.
    strip-comments: true
    toc: true
    epub-cover-image: cover/frente.jpg
    include-in-header: _extensions/orange-book-es/epub-estilos.html
