project:
  type: book
  output-dir: _book

lang: es
version: "0.8.1"
repo-url: "https://github.com/VuelaLibre-net/teoria-licencia-SPL"
cubierta: "cover/frente.jpg"
contracubierta: "cover/reverso.jpg"

book:
  title: "Navegación"
  author: "VuelaLibre.net"
  chapters:
    - index.qmd
    - licencia.qmd
    - dedicatoria.qmd
    - epigrafe.qmd
    - reconocimientos.qmd
    - introduccion.qmd
    - cap01-fundamentos-de-navegación.qmd
    - cap02-magnetismo-y-brújulas.qmd
    - cap03-cartas-aeronáuticas.qmd
    - cap04-navegación-por-estima.qmd
    - cap05-navegación-en-vuelo.qmd
    - cap06-uso-de-gnss.qmd
    - cap07-uso-de-ats.qmd
  appendices:
    - apendice-syllabus-oficial-easa---navegación.qmd
    - glosario.qmd
    - bibliografia.qmd
    - colofon.qmd
    - contracubierta.qmd

format:
  orange-book-es-typst:
    toc: true
    number-sections: true
    keep-typ: true
    margin:
      top: 2.5cm
      bottom: 2.5cm
  epub:
    # Los .qmd llevan la marca GUÍA-DE-LECTURA como comentario HTML, para el
    # editor. Typst los descarta solos; el EPUB los arrastraría al entregable.
    strip-comments: true
    toc: true
    epub-cover-image: cover/frente.jpg
    include-in-header: _extensions/orange-book-es/epub-estilos.html
