project:
  type: book
  output-dir: _book

lang: es
version: "1.0-rc.5"
repo-url: "https://github.com/VuelaLibre-net/teoria-licencia-SPL"
cubierta: "cover/frente.jpg"
contracubierta: "cover/reverso.jpg"

book:
  title: "Derecho Aéreo y Procedimientos de Control de Tránsito Aéreo (ATC)"
  author: "VuelaLibre.net"
  chapters:
    - index.qmd
    - licencia.qmd
    - dedicatoria.qmd
    - epigrafe.qmd
    - reconocimientos.qmd
    - introduccion.qmd
    - cap01-derecho-internacional-convenios-acuerdos-y-organizaciones.qmd
    - cap02-aeronavegabilidad.qmd
    - cap03-marcas-de-nacionalidad-y-matricula-de-aeronaves.qmd
    - cap04-licencias-de-personal.qmd
    - cap05-reglas-del-aire.qmd
    - cap06-procedimientos-para-navegacion-aerea-operaciones-de-aeronaves.qmd
    - cap07-reglamentacion-de-transito-aereo-estructura-del-espacio-aereo.qmd
    - cap08-servicio-de-transito-aereo.qmd
    - cap09-servicios-de-informacion-aeronautica-ais.qmd
    - cap10-aerodromos-y-campos-de-despegue-externos.qmd
    - cap11-busqueda-y-salvamento.qmd
    - cap12-seguridad.qmd
    - cap13-notificacion-de-accidentes.qmd
    - cap14-derecho-nacional.qmd
  appendices:
    - apendice-syllabus-oficial-easa---derecho-aereo.qmd
    - glosario.qmd
    - bibliografia.qmd
    - colofon.qmd
    - contracubierta.qmd

format:
  orange-book-es-typst:
    toc: true
    number-sections: true
    keep-typ: true
    margin:
      top: 2.5cm
      bottom: 2.5cm
  epub:
    # Los .qmd llevan la marca GUÍA-DE-LECTURA como comentario HTML, para el
    # editor. Typst los descarta solos; el EPUB los arrastraría al entregable.
    strip-comments: true
    toc: true
    epub-cover-image: cover/frente.jpg
    include-in-header: _extensions/orange-book-es/epub-estilos.html
